name: CI
on:
  pull_request:
    branches:
      - master
      - next
  push:
    branches:
      - beta
      - master
      - next

permissions:
  contents: write 
  issues: write
  pull-requests: write
  id-token: write
  
jobs:
  build:
    uses: Neovici/cfg/.github/workflows/forge.yml@master
    secrets: inherit
